<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Beefsteak Zadar</title>
    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="icon" type="image/png" href="../assets/img/favicon.png">
</head>
<body>
    <header>
        <div class="logo no-select">BEEFSTEAK <span>ZADAR</span></div>
        <nav>
            <ul>
                <li><a href="../index.html" class="no-select">Početna</a></li>
                <li><a href="jelovnik.html" class="no-select">Jelovnik</a></li>
                <li><a href="o-nama.html" class="no-select">O nama</a></li>
                <li><a href="kontakt.html" class="active no-select">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">Gdje se nalazimo?</h1>
        
        <div class="map-container" style="margin-bottom: 40px;">
           <iframe 
           src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2551.9547794561427!2d15.226214831674174!3d44.11487926805004!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4761fa6e44eff21b%3A0x502609c2c6d4c578!2sRestaurant%20Malo%20Misto!5e0!3m2!1shr!2shr!4v1776724113401!5m2!1shr!2shr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">

           </iframe>
        </div>

        <section class="contact-info" style="display: flex; flex-wrap: wrap; gap: 40px; justify-content: space-between;">
            <div class="contact-details" style="flex: 1; min-width: 250px;">
                <h2>Kontaktirajte nas</h2>
                <p style="display: flex; align-items: center; margin-bottom: 15px;">
                    <img src="../assets/img/map-pin.svg" alt="Adresa" width="24" style="margin-right: 15px;"> 
                    Ulica Hrvoja Ćustića, 23000 Zadar
                </p>
                <p style="display: flex; align-items: center; margin-bottom: 15px;">
                    <img src="../assets/img/phone.png" alt="Telefon" width="24" style="margin-right: 15px;"> 
                    +385 91 234 5678
                </p>
                <p style="display: flex; align-items: center; margin-bottom: 15px;">
                    <img src="../assets/img/email.svg" alt="Email" width="24" style="margin-right: 15px;"> 
                    info@beefsteak-zadar.hr
                </p>
            </div>

            <div class="form-wrapper" style="flex: 2; min-width: 300px;">
                <h2>Pošaljite nam poruku</h2>
                <form class="form-container" action="#">
                    <div class="form-group">
                        <label for="kontakt-ime">Vaše ime:</label>
                        <input type="text" id="kontakt-ime" name="ime" required placeholder="Ime i prezime">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail adresa:</label>
                        <input type="email" id="email" name="email" required placeholder="primjer@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="poruka">Vaša poruka:</label>
                        <textarea id="poruka" name="poruka" rows="5" required style="width: 100%; background: #121212; color: #fff; border: 1px solid #444; padding: 10px;"></textarea>
                    </div>
                    <button type="submit" class="btn">Pošalji poruku</button>
                </form>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 20px; margin-top: 40px;">
        <p>© 2026 Beefsteak Zadar. Studij IT, UNIZD.</p>
        <div class="social-icons" style="margin-top: 10px;">
            <a href="https://www.facebook.com" target="_blank" style="margin: 0 10px;"><img src="../assets/img/facebook.svg" alt="Facebook" width="24" height="24"></a>
            <a href="https://www.instagram.com" target="_blank" style="margin: 0 10px;"><img src="../assets/img/instagram.svg" alt="Instagram" width="24" height="24"></a>
        </div>
    </footer>
</body>
</html>
